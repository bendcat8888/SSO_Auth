services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: innogen_sso
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d innogen_sso"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  api:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/innogen_sso
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CORS_ALLOWED_ORIGIN_REGEX: ${CORS_ALLOWED_ORIGIN_REGEX:-^https?://([a-z0-9-]+\.)*(innogen-pharma\.(com|ph)|innogen\.local)(:[0-9]+)?$}
      SQLALCHEMY_CREATE_TABLES: "true"
      SSO_COOKIE_NAME: device_token
      SSO_COOKIE_SECURE: "true"
      SSO_COOKIE_SAMESITE: "none"
      SSO_COOKIE_MAX_AGE_SECONDS: "2592000"
      CPANEL_HOST: ${CPANEL_HOST}
      CPANEL_USERNAME: ${CPANEL_USERNAME}
      CPANEL_PASSWORD: ${CPANEL_PASSWORD}
      CPANEL_API_TOKEN: ${CPANEL_API_TOKEN}
      CPANEL_PORT: ${CPANEL_PORT:-2083}
      CPANEL_VERIFY_TLS: ${CPANEL_VERIFY_TLS:-true}
      CPANEL_ACCESS_MODE: ${CPANEL_ACCESS_MODE:-auto}
      CPANEL_ACCOUNT: ${CPANEL_ACCOUNT}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID}
      APPLE_KEY_ID: ${APPLE_KEY_ID}
      APPLE_PRIVATE_KEY: ${APPLE_PRIVATE_KEY}
      APPLE_REDIRECT_URI: ${APPLE_REDIRECT_URI}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8520/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "8520:8520"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
